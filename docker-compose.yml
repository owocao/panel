services:
  biu-panel:
    build: .
    image: biu-panel:latest
    container_name: biu-panel
    restart: unless-stopped
    ports:
      - "${BIU_PANEL_HOST_PORT:-55088}:55088"
    environment:
      BIU_PANEL_PORT: "55088"
      BIU_PANEL_DATA_DIR: /app/data
      BIU_PANEL_STATIC_DIR: /app/public
      TZ: ${TZ:-Asia/Shanghai}
      # 可选：首次启动自动创建管理员。创建后请删除或注释这两行再重启；更推荐直接打开网页完成初始化。
      # BIU_PANEL_ADMIN_USER: your-admin-name
      # BIU_PANEL_ADMIN_PASSWORD: change-this-password-before-first-start
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
